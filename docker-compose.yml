services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Port NOT exposed externally — only accessible by other containers

  mongodb:
    image: mongo:7
    restart: unless-stopped
    # Port NOT exposed externally — only accessible by other containers
    volumes:
      - mongo_data:/data/db

  mcp-broker:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on: [redis, mongodb]
    restart: unless-stopped

  agent-ingestion:
    build: .
    command: python -m arq agents.ingestion.WorkerSettings
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on: [redis, mongodb]
    restart: unless-stopped

  agent-detection:
    build: .
    command: python -m arq agents.detection.WorkerSettings
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on: [redis, mongodb]
    restart: unless-stopped

  agent-correlation:
    build: .
    command: python -m arq agents.correlation.WorkerSettings
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on: [redis, mongodb]
    restart: unless-stopped

  agent-investigation:
    build: .
    command: python -m arq agents.investigation.WorkerSettings
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on: [redis, mongodb]
    restart: unless-stopped

  agent-alerting:
    build: .
    command: python -m arq agents.alerting.WorkerSettings
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on: [redis, mongodb]
    restart: unless-stopped

  syslog-listener:
    build: .
    command: python -m agents.syslog_listener
    ports:
      - "514:514/udp"
      - "601:601/tcp"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on: [redis, mongodb]
    restart: unless-stopped

volumes:
  mongo_data:
